# ============================================================
# Casa Hidalgo — Configuración Netlify (Next.js)
# ============================================================
# Netlify detecta automáticamente Next.js y usa el plugin oficial.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# El plugin de Next.js viene preinstalado en Netlify desde 2024
# pero lo declaramos explícitamente por claridad.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
