<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa Hidalgo — Espacios Querétaro</title>
<meta name="description" content="Espacios profesionales para reuniones, contenido y coworking en el Centro Histórico de Querétaro.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --stone: #ece5d8;
    --stone-2: #ddd2bd;
    --bone: #f6f1e6;
    --ink: #1d1916;
    --ink-soft: #3a342d;
    --terra: #b94a2c;
    --terra-deep: #8c3520;
    --moss: #4a5c3a;
    --moss-deep: #34452a;
    --gold: #c69748;
    --paper: #faf6ec;
    --line: rgba(29,25,22,0.12);
    --line-strong: rgba(29,25,22,0.25);
    --error: #c43c2a;
    --success: #4a5c3a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--paper); color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  body{
    background-image:
      radial-gradient(1200px 600px at 80% -10%, rgba(185,74,44,0.06), transparent 60%),
      radial-gradient(900px 500px at -10% 30%, rgba(74,92,58,0.06), transparent 60%);
  }
  .serif{ font-family: 'Fraunces', serif; }
  .mono{ font-family: 'JetBrains Mono', monospace; }
  button{ font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select{ font-family: inherit; color: inherit; }
  a{ color: inherit; text-decoration: none; }

  .btn{
    padding: 11px 22px; border-radius: 999px;
    font-size: 13.5px; font-weight: 500;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid transparent; white-space: nowrap;
  }
  .btn-primary{ background: var(--ink); color: var(--paper); }
  .btn-primary:hover{ background: var(--terra); transform: translateY(-1px); }
  .btn-terra{ background: var(--terra); color: var(--paper); }
  .btn-terra:hover{ background: var(--terra-deep); }
  .btn-ghost{ background: transparent; color: var(--ink); border-color: var(--line-strong); }
  .btn-ghost:hover{ background: var(--ink); color: var(--paper); }
  .btn-large{ padding: 14px 28px; font-size: 14.5px; }
  .btn-full{ width: 100%; justify-content: center; }
  .btn:disabled{ opacity: 0.5; cursor: not-allowed; }
  .btn:disabled:hover{ transform: none; }

  .config-error{
    max-width: 600px; margin: 80px auto; padding: 40px;
    background: var(--bone); border: 2px solid var(--error); border-radius: 16px;
  }
  .config-error h2{ font-family: 'Fraunces', serif; font-size: 28px; margin-bottom: 16px; color: var(--error); }

  .nav{
    backdrop-filter: blur(14px); background: rgba(250,246,236,0.85);
    border-bottom: 1px solid var(--line); padding: 18px 36px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; position: sticky; top: 0; z-index: 50;
  }
  .nav-logo{
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 22px;
    letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  .nav-logo .mark{
    width: 30px; height: 30px; background: var(--ink); color: var(--paper);
    display: grid; place-items: center; border-radius: 4px;
    font-family: 'Fraunces', serif; font-style: italic; font-size: 17px;
  }
  .nav-links{ display: flex; gap: 32px; font-size: 14px; }
  .nav-links button{ color: var(--ink-soft); padding: 6px 0; position: relative; transition: color 0.2s; }
  .nav-links button:hover{ color: var(--ink); }
  .nav-links button.active{ color: var(--ink); font-weight: 500; }
  .nav-links button.active::after{
    content:""; position: absolute; bottom: 0; left: 0; right: 0;
    height: 1px; background: var(--terra);
  }
  .nav-user{ display: flex; align-items: center; gap: 14px; font-size: 13.5px; }
  .nav-user .avatar{
    width: 36px; height: 36px; background: var(--ink); color: var(--paper);
    border-radius: 50%; display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-size: 13px;
  }
  .nav-user .who .name{ font-weight: 500; }
  .nav-user .who .role{ font-size: 11.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; }
  .role-admin{ color: var(--terra) !important; }
  @media (max-width: 880px){
    .nav{ padding: 14px 20px; }
    .nav-links{ display: none; }
    .nav-user .who{ display: none; }
  }

  .hero{
    max-width: 1280px; margin: 0 auto; padding: 70px 36px 80px;
    display: grid; grid-template-columns: 1.15fr 1fr;
    gap: 60px; align-items: center;
  }
  @media (max-width: 880px){ .hero{ grid-template-columns: 1fr; padding: 40px 20px 60px; gap: 40px; } }
  .hero-eyebrow{
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--ink-soft); margin-bottom: 28px;
  }
  .hero-eyebrow .dot{ width: 6px; height: 6px; background: var(--terra); border-radius: 50%; animation: pulse 2.4s infinite; }
  @keyframes pulse{ 0%,100%{ opacity: 1; transform: scale(1); } 50%{ opacity: 0.5; transform: scale(1.4); } }
  .hero h1{
    font-family: 'Fraunces', serif; font-weight: 350;
    font-size: clamp(42px, 6vw, 86px); line-height: 0.98;
    letter-spacing: -0.035em; margin-bottom: 28px;
  }
  .hero h1 em{ font-style: italic; color: var(--terra); }
  .hero p.lead{ font-size: 17px; line-height: 1.55; color: var(--ink-soft); max-width: 480px; margin-bottom: 36px; }
  .hero-meta{ display: flex; gap: 36px; margin-top: 50px; padding-top: 28px; border-top: 1px solid var(--line); }
  .hero-meta div{ display: flex; flex-direction: column; gap: 4px; }
  .hero-meta .num{ font-family: 'Fraunces', serif; font-size: 28px; line-height: 1; }
  .hero-meta .label{ font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-soft); }
  .hero-visual{
    aspect-ratio: 4/5; background: linear-gradient(135deg, #6b5d4a 0%, #3d342a 100%);
    border-radius: 18px; overflow: hidden;
    box-shadow: 0 30px 80px -30px rgba(29,25,22,0.4); position: relative;
  }
  .hero-visual svg{ width: 100%; height: 100%; }

  .section{ max-width: 1280px; margin: 0 auto; padding: 80px 36px; }
  @media (max-width: 880px){ .section{ padding: 60px 20px; } }
  .section-head{
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 50px; gap: 40px; flex-wrap: wrap;
  }
  .section-head h2{
    font-family: 'Fraunces', serif; font-weight: 350;
    font-size: clamp(32px, 4.5vw, 56px); line-height: 1;
    letter-spacing: -0.025em; max-width: 700px;
  }
  .section-head h2 em{ font-style: italic; color: var(--terra); }
  .section-head .label{ font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-soft); padding-bottom: 12px; }

  .spaces-grid{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  @media (max-width: 980px){ .spaces-grid{ grid-template-columns: 1fr; } }
  .space-card{
    background: var(--bone); border: 1px solid var(--line);
    border-radius: 18px; padding: 28px;
    display: flex; flex-direction: column; transition: all 0.3s;
  }
  .space-card:hover{ transform: translateY(-4px); box-shadow: 0 20px 40px -20px rgba(29,25,22,0.18); }
  .space-card.terra{ --accent: var(--terra); }
  .space-card.blue{ --accent: #2c5e8e; }
  .space-card.moss{ --accent: var(--moss); }
  .space-tag{
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--accent); margin-bottom: 14px; font-weight: 500;
  }
  .space-tag::before{ content:""; width: 20px; height: 1px; background: var(--accent); }
  .space-card h3{
    font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px;
    line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 12px;
  }
  .space-card .desc{ color: var(--ink-soft); font-size: 14px; line-height: 1.55; margin-bottom: 22px; }
  .space-card .features{
    list-style: none; display: flex; flex-direction: column; gap: 7px;
    font-size: 13px; color: var(--ink-soft); margin-bottom: 22px; flex: 1;
  }
  .space-card .features li{ display: flex; align-items: flex-start; gap: 10px; }
  .space-card .features li::before{
    content:""; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); margin-top: 8px; flex-shrink: 0;
  }
  .space-card .meta{
    display: flex; justify-content: space-between; align-items: flex-end;
    padding-top: 18px; border-top: 1px solid var(--line); margin-bottom: 18px;
  }
  .space-card .price .num{ font-family: 'Fraunces', serif; font-size: 28px; line-height: 1; }
  .space-card .price .unit{ font-size: 11.5px; color: var(--ink-soft); margin-top: 6px; }
  .space-card .cap{ font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); }

  .reservations-list{ display: flex; flex-direction: column; gap: 14px; }
  .res-card{
    background: var(--bone); border: 1px solid var(--line);
    border-radius: 16px; padding: 24px 26px;
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center;
  }
  @media (max-width: 640px){ .res-card{ grid-template-columns: 1fr; } }
  .res-folio{ font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
  .res-title{
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
    letter-spacing: -0.015em; margin-bottom: 8px;
  }
  .res-meta{ display: flex; gap: 18px; font-size: 13px; color: var(--ink-soft); flex-wrap: wrap; }
  .res-meta span{ display: flex; align-items: center; gap: 6px; }
  .res-right{ display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  @media (max-width: 640px){ .res-right{ align-items: flex-start; } }
  .res-total{ font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; }

  .pill{
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 500;
  }
  .pill::before{ content:""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.confirmed{ background: rgba(74,92,58,0.12); color: var(--moss-deep); }
  .pill.pending{ background: rgba(198,151,72,0.16); color: #8c6a2a; }
  .pill.cancelled{ background: rgba(185,74,44,0.12); color: var(--terra-deep); }
  .pill.completed{ background: rgba(29,25,22,0.08); color: var(--ink-soft); }

  .modal-overlay{
    position: fixed; inset: 0; background: rgba(15,12,10,0.65);
    backdrop-filter: blur(8px); z-index: 100;
    display: grid; place-items: center; padding: 24px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn{ from{ opacity: 0; } to{ opacity: 1; } }
  #root {
    transition: opacity 0.12s ease-out;
  }
  #root.rendering {
    opacity: 0.7;
  }
  .modal{
    background: var(--paper); border-radius: 24px;
    max-width: 560px; width: 100%; max-height: 92vh; overflow: auto;
    padding: 44px; box-shadow: 0 40px 100px rgba(0,0,0,0.4);
    animation: slideUp 0.35s cubic-bezier(0.2,0.8,0.2,1); position: relative;
  }
  .modal.wide{ max-width: 720px; }
  @media (max-width: 640px){ .modal{ padding: 28px; } }
  @keyframes slideUp{ from{ opacity: 0; transform: translateY(20px); } to{ opacity: 1; transform: translateY(0); } }
  .modal-close{
    position: absolute; top: 18px; right: 18px;
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink-soft); transition: all 0.2s;
  }
  .modal-close:hover{ background: var(--stone); color: var(--ink); }
  .modal h3{
    font-family: 'Fraunces', serif; font-weight: 400; font-size: 30px;
    letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.1;
  }
  .modal h3 em{ font-style: italic; color: var(--terra); }
  .modal .sub{ color: var(--ink-soft); font-size: 14.5px; margin-bottom: 28px; line-height: 1.5; }

  .form-row{ display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-row.two{ display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row.two > div{ display: flex; flex-direction: column; gap: 6px; }
  @media (max-width: 480px){ .form-row.two{ grid-template-columns: 1fr; } }
  .form-row label{ font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); font-weight: 500; }
  .form-row input, .form-row select, .form-row textarea{
    border: 1px solid var(--line-strong); background: var(--bone);
    border-radius: 10px; padding: 13px 14px; font-size: 15px;
    outline: none; transition: all 0.2s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus{ border-color: var(--ink); background: var(--paper); }
  .form-row textarea{ resize: vertical; min-height: 80px; }

  .auth-tabs{
    display: flex; background: var(--stone);
    border-radius: 999px; padding: 4px; margin-bottom: 24px; gap: 2px;
  }
  .auth-tabs button{
    flex: 1; padding: 8px 14px; border-radius: 999px;
    font-size: 13px; color: var(--ink-soft); transition: all 0.2s;
  }
  .auth-tabs button.active{ background: var(--paper); color: var(--ink); font-weight: 500; }

  .alert{ padding: 12px 14px; border-radius: 10px; font-size: 13.5px; margin-bottom: 16px; line-height: 1.45; }
  .alert-error{ background: rgba(196,60,42,0.08); color: var(--error); border: 1px solid rgba(196,60,42,0.2); }
  .alert-success{ background: rgba(74,92,58,0.08); color: var(--success); border: 1px solid rgba(74,92,58,0.2); }
  .alert-info{ background: rgba(29,25,22,0.04); color: var(--ink-soft); border: 1px solid var(--line); }
  .loader{
    width: 16px; height: 16px;
    border: 2px solid rgba(246,241,230,0.3); border-top-color: var(--paper);
    border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .booking-steps{
    display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-soft);
  }
  .booking-steps .step{ display: flex; align-items: center; gap: 8px; opacity: 0.4; }
  .booking-steps .step.active{ opacity: 1; color: var(--ink); }
  .booking-steps .step.done{ opacity: 1; color: var(--moss); }
  .booking-steps .step-num{
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid currentColor; display: grid; place-items: center; font-size: 11px;
  }
  .booking-steps .step.active .step-num{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .booking-steps .step.done .step-num{ background: var(--moss); color: var(--paper); border-color: var(--moss); }
  .booking-steps .divider{ flex: 1; height: 1px; background: var(--line); }

  .pick-space{ display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  @media (max-width: 480px){ .pick-space{ grid-template-columns: 1fr; } }
  .pick-card{
    border: 1.5px solid var(--line); border-radius: 12px;
    padding: 14px; text-align: left; transition: all 0.2s;
    display: flex; flex-direction: column; gap: 4px; cursor: pointer;
  }
  .pick-card:hover{ border-color: var(--line-strong); }
  .pick-card.selected{ border-color: var(--ink); background: var(--ink); color: var(--paper); }
  .pick-card .pname{ font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  .pick-card .pprice{ font-size: 11.5px; opacity: 0.7; }

  .hours-grid{ display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 480px){ .hours-grid{ grid-template-columns: repeat(3, 1fr); } }
  .hour-btn{
    padding: 12px 4px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 13px; background: var(--bone);
    transition: all 0.15s; cursor: pointer;
  }
  .hour-btn:hover:not(:disabled){ border-color: var(--ink); }
  .hour-btn.selected{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .hour-btn:disabled{
    opacity: 0.35; text-decoration: line-through;
    cursor: not-allowed; background: var(--stone);
  }
  .slots-loading{ text-align: center; padding: 20px; color: var(--ink-soft); font-size: 13px; }

  .summary-card{ background: var(--stone); border-radius: 14px; padding: 20px 22px; margin: 16px 0; }
  .summary-row{ display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
  .summary-row .l{ color: var(--ink-soft); }
  .summary-row .r{ font-weight: 500; }
  .summary-row.total{
    border-top: 1px solid var(--line-strong); margin-top: 6px;
    padding-top: 14px; font-size: 16px;
  }
  .summary-row.total .r{ font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; }

  .conf-check{
    width: 64px; height: 64px; background: var(--moss);
    border-radius: 50%; display: grid; place-items: center; margin: 0 auto 24px;
  }
  .conf-folio{
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    background: var(--ink); color: var(--paper);
    padding: 6px 12px; border-radius: 6px;
    display: inline-block; margin-top: 8px;
  }

  .toast{
    position: fixed; bottom: 30px; right: 30px;
    background: var(--ink); color: var(--paper);
    padding: 14px 20px; border-radius: 12px; z-index: 200;
    display: flex; align-items: center; gap: 12px;
    font-size: 13.5px; box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    animation: slideIn 0.3s cubic-bezier(0.2,0.8,0.2,1); max-width: 380px;
  }
  .toast.toast-error{ background: var(--error); }
  @keyframes slideIn{ from{ opacity: 0; transform: translateX(20px); } to{ opacity: 1; transform: translateX(0); } }

  .empty{ text-align: center; padding: 60px 20px; color: var(--ink-soft); }
  .empty h3{ font-family: 'Fraunces', serif; font-size: 22px; margin-bottom: 10px; color: var(--ink); }
</style>
</head>
<body>
<div id="root"></div>

<script src="/config.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const config = window.__APP_CONFIG__;
if(!config || !config.SUPABASE_URL || !config.SUPABASE_ANON_KEY || config.SUPABASE_URL.includes('PLACEHOLDER')){
  document.getElementById('root').innerHTML = `<div class="config-error"><h2>⚠ Configuración faltante</h2></div>`;
  throw new Error('Missing config');
}
const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

// ============================================================
// STATE
// ============================================================
const state = {
  session: null,
  profile: null,
  spaces: [],
  myBookings: [],
  view: 'home',
  authModal: null,
  authPendingAction: null,
  bookingModal: null,
  bookingStep: 1,
  bookingData: {
    spaceId: null, date: '', time: '10:00', hours: 2, notes: '',
    availableSlots: null, loadingSlots: false
  },
  confirmedBooking: null,
  toast: null
};

const root = document.getElementById('root');

// ============================================================
// UTILS
// ============================================================
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = (name) => {
  const parts = (name || '').trim().split(/\s+/);
  return ((parts[0]?.[0] || '') + (parts[parts.length-1]?.[0] || '')).toUpperCase() || '?';
};
const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'America/Mexico_City' }) : '';
const fmtMoney = (cents) => `$${(cents/100).toLocaleString('es-MX')} mxn`;
const todayPlus = (days) => {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
};
const showToast = (msg, type='success') => {
  state.toast = { msg, type };
  render();
  setTimeout(() => { state.toast = null; render(); }, 3500);
};

// ============================================================
// DATA
// ============================================================
async function init(){
  const { data: { session } } = await supabase.auth.getSession();
  state.session = session;
  await loadSpaces();
  if(session){
    await loadProfile();
    await loadMyBookings();
  }
  render();

  supabase.auth.onAuthStateChange(async (event, session) => {
    state.session = session;
    if(session){
      await loadProfile();
      await loadMyBookings();
      if(state.authPendingAction?.type === 'reserve' && event === 'SIGNED_IN'){
        const sid = state.authPendingAction.spaceId;
        state.authPendingAction = null;
        openBooking(sid);
      } else {

function calcBookingPrice(){
  const space = state.spaces.find(s => s.id === state.bookingData.spaceId);
  if(!space) return { subtotal_cents: 0, tax_cents: 0, total_cents: 0 };
  let subtotal_cents;
  if(space.pricing_model === 'daily'){
    subtotal_cents = state.bookingData.hours === 7 ? space.extra_price * 100 : space.base_price * 100;
  } else {
    const baseHours = 2;
    const extraHours = Math.max(0, state.bookingData.hours - baseHours);
    subtotal_cents = (space.base_price + extraHours * space.extra_price) * 100;
  }
  const tax_cents = Math.round(subtotal_cents * 0.16);
  return { subtotal_cents, tax_cents, total_cents: subtotal_cents + tax_cents };
}

async function createBooking(){
  if(!state.session){ showToast('Debes iniciar sesión', 'error'); return; }
  const space = state.spaces.find(s => s.id === state.bookingData.spaceId);
  if(!space) return;
  const { subtotal_cents, tax_cents, total_cents } = calcBookingPrice();
  const { date, time, hours, notes } = state.bookingData;

  // Construir starts/ends en TZ México (-06:00 sin DST)
  const startsAt = new Date(`${date}T${time}:00-06:00`);
  let duration_hours, durationMs;
  if(space.pricing_model === 'daily'){
    duration_hours = hours === 7 ? 56 : 8;  // 7 días * 8h workday, o 1 día = 8h
    durationMs = (hours === 7 ? 7 * 24 : 8) * 60 * 60 * 1000;  // calendarmente
  } else {
    duration_hours = hours;
    durationMs = hours * 60 * 60 * 1000;
  }
  const endsAt = new Date(startsAt.getTime() + durationMs);

  const payload = {
    user_id: state.session.user.id,
    space_id: space.id,
    starts_at: startsAt.toISOString(),
    ends_at: endsAt.toISOString(),
    duration_hours,
    customer_name: state.profile?.full_name || state.session.user.email,
    customer_email: state.session.user.email,
    customer_phone: state.profile?.phone || 'sin-telefono',
    notes: notes || null,
    subtotal_cents, tax_cents, total_cents,
    status: 'pending',
    folio: ''
  };

  const { data, error } = await supabase
    .from('bookings')
    .insert(payload)
    .select('*, spaces(name, accent_color, base_unit)')
    .single();

  if(error){
    console.error('createBooking error:', error);
    if(error.code === '23P01' || /overlap|exclude/i.test(error.message)){
      showToast('Esa hora ya está reservada. Elige otra hora o fecha.', 'error');
    } else {
      showToast(`Error: ${error.message}`, 'error');
    }
    return null;
  }
  return data;
}

function openBooking(spaceId){
  if(!state.session){
    state.authPendingAction = { type: 'reserve', spaceId };
    state.authModal = 'signin';
    render();
    return;
  }
  state.bookingModal = spaceId;
  state.bookingStep = 1;
  state.bookingData = {
    spaceId, date: todayPlus(1), time: '10:00', hours: 2, notes: '',
    availableSlots: null, loadingSlots: false
  };
  state.confirmedBooking = null;
  render();
  loadAvailableSlots(spaceId, todayPlus(1));
}

function closeModals(){
  state.authModal = null;
  state.bookingModal = null;
  state.confirmedBooking = null;
  state.authPendingAction = null;
  render();
}

function render(){
  // Usamos requestAnimationFrame para evitar el flash al re-renderizar.
  // El navegador agrupa el cambio de DOM en un solo frame.
  requestAnimationFrame(() => {
    const scrollY = window.scrollY;  // ← guardar scroll

    let html = renderNav();
    if(state.view === 'home') html += renderHome();
    else if(state.view === 'mis-reservas') html += renderMyBookings();

    if(state.authModal) html += renderAuthModal();
    if(state.bookingModal) html += state.confirmedBooking ? renderConfirmation() : renderBookingModal();
    if(state.toast) html += `<div class="toast ${state.toast.type==='error' ? 'toast-error' : ''}">${esc(state.toast.msg)}</div>`;

    root.innerHTML = html;
    attachListeners();

    window.scrollTo(0, scrollY);  // ← restaurar scroll
  });
}

                <button class="hour-btn ${selected ? 'selected' : ''}" ${disabled ? 'disabled' : ''}
                  data-action="pick-hour" data-hour="${h}"
                  title="${taken ? 'Hora ocupada' : wouldOverflow ? 'Excede horario de cierre' : ''}"
                >${h}</button>
              `;
            }).join('')}
          </div>
        `}
        ${slots && slots.length > 0 && !loading ? `
          <div style="font-size:11.5px; color:var(--ink-soft); margin-top:8px;">
            Las horas tachadas ya están reservadas. Datos en vivo desde la BD.
          </div>
        ` : ''}
      </div>
    ` : ''}
    ${renderSummaryCard(space)}
    <div style="display:flex; justify-content:space-between; margin-top:20px;">
      <button class="btn btn-ghost" data-action="prev-step">Atrás</button>
      <button class="btn btn-primary btn-large" data-action="next-step">Continuar</button>
    </div>
  `;
}

function renderStep3(space){
  return `
    ${renderSummaryCard(space, true)}
    <div class="form-row">
      <label>Notas (opcional)</label>
      <textarea id="booking-notes" placeholder="¿Necesitas algo en particular? Café para 4, configuración específica, etc.">${esc(state.bookingData.notes)}</textarea>
    </div>
    <div class="alert alert-info">
      <strong>Demo 2:</strong> La reserva se crea con estado <strong>pendiente de pago</strong>. En el Demo 3 conectamos MercadoPago.
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:20px;">
      <button class="btn btn-ghost" data-action="prev-step">Atrás</button>
      <button class="btn btn-terra btn-large" data-action="confirm-booking" id="confirm-btn">Confirmar reserva</button>
    </div>
  `;
}

function renderSummaryCard(space, detailed=false){
  const { subtotal_cents, tax_cents, total_cents } = calcBookingPrice();
  const isCoworking = space.pricing_model === 'daily';
  const durationLabel = isCoworking
    ? (state.bookingData.hours === 7 ? 'Paquete 7 días' : 'Day Pass · 1 día')
    : `${state.bookingData.hours} ${state.bookingData.hours === 1 ? 'hora' : 'horas'}`;
  return `
    <div class="summary-card">
      <div class="summary-row"><span class="l">Espacio</span><span class="r">${esc(space.name)}</span></div>
      <div class="summary-row"><span class="l">Fecha</span><span class="r">${fmtDate(state.bookingData.date)}</span></div>
      ${!isCoworking ? `<div class="summary-row"><span class="l">Hora</span><span class="r">${esc(state.bookingData.time)}</span></div>` : ''}
      <div class="summary-row"><span class="l">Duración</span><span class="r">${durationLabel}</span></div>
      ${detailed ? `
        <div class="summary-row"><span class="l">Subtotal</span><span class="r">${fmtMoney(subtotal_cents)}</span></div>
        <div class="summary-row"><span class="l">IVA (16%)</span><span class="r">${fmtMoney(tax_cents)}</span></div>
      ` : ''}
      <div class="summary-row total"><span class="l">Total</span><span class="r">${fmtMoney(total_cents)}</span></div>
    </div>
  `;
}

function renderConfirmation(){
  const b = state.confirmedBooking;
  const space = b.spaces || {};
  return `
    <div class="modal-overlay" data-close-overlay>
      <div class="modal" data-stop>
        <button class="modal-close" data-action="close-modal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <div class="conf-check">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 12l5 5 9-9"/></svg>
        </div>
        <h3 class="serif" style="text-align:center;">¡Reserva <em>creada</em>!</h3>
        <p class="sub" style="text-align:center;">Tu folio es <span class="conf-folio">${esc(b.folio)}</span></p>
        <div class="summary-card">
          <div class="summary-row"><span class="l">Espacio</span><span class="r">${esc(space.name)}</span></div>
          <div class="summary-row"><span class="l">Fecha</span><span class="r">${fmtDate(b.starts_at)}</span></div>
          <div class="summary-row"><span class="l">Horario</span><span class="r">${fmtTime(b.starts_at)} — ${fmtTime(b.ends_at)}</span></div>
          <div class="summary-row"><span class="l">Estado</span><span class="r"><span class="pill ${esc(b.status)}">${esc(traduceStatus(b.status))}</span></span></div>
          <div class="summary-row total"><span class="l">Total</span><span class="r">${fmtMoney(b.total_cents)}</span></div>
        </div>
        <div class="alert alert-info">Estado: <strong>pendiente de pago</strong>. En el Demo 3 conectamos MercadoPago.</div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-ghost btn-full" data-action="close-modal">Cerrar</button>
          <button class="btn btn-primary btn-full" data-action="go-mis-reservas">Ver mis reservas</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// LISTENERS
// ============================================================
function attachListeners(){
  root.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => handleAction(el.dataset.action, el, e));
  });
  root.querySelectorAll('[data-scroll]').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById(el.dataset.scroll)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
  root.querySelectorAll('[data-close-overlay]').forEach(el => {
    el.addEventListener('click', (e) => { if(e.target === el) closeModals(); });
  });
  document.getElementById('signin-form')?.addEventListener('submit', handleSignIn);
  document.getElementById('signup-form')?.addEventListener('submit', handleSignUp);
  document.getElementById('magic-form')?.addEventListener('submit', handleMagicLink);
  document.getElementById('booking-date')?.addEventListener('change', (e) => {
    state.bookingData.date = e.target.value;
    loadAvailableSlots(state.bookingData.spaceId, e.target.value);
  });
  document.getElementById('booking-hours')?.addEventListener('change', (e) => {
    state.bookingData.hours = parseInt(e.target.value, 10);
    render();
  });
  document.getElementById('booking-notes')?.addEventListener('input', (e) => {
    state.bookingData.notes = e.target.value;
  });
}

async function handleAction(action, el, ev){
  ev?.preventDefault();
  switch(action){
    case 'go-home': state.view = 'home'; render(); break;
    case 'go-mis-reservas':
      closeModals();
      state.view = 'mis-reservas';
      render(); // respuesta visual inmediata al primer clic
      await loadMyBookings();
      render();
      break;
    case 'open-signin': state.authModal = 'signin'; render(); break;
    case 'open-signup': state.authModal = 'signup'; render(); break;
    case 'auth-mode': state.authModal = el.dataset.mode; render(); break;
    case 'close-modal': closeModals(); break;
    case 'signout': await signOut(); render(); break;
    case 'reserve': openBooking(el.dataset.space); break;
    case 'pick-space':
      state.bookingData.spaceId = el.dataset.space;
      render();
      break;
    case 'next-step':
      if(state.bookingStep < 3){
        state.bookingStep++;
        if(state.bookingStep === 2){
          loadAvailableSlots(state.bookingData.spaceId, state.bookingData.date);
        } else {
          render();
        }
      }
      break;
    case 'prev-step':
      if(state.bookingStep > 1){ state.bookingStep--; render(); }
      break;
    case 'pick-hour':
      state.bookingData.time = el.dataset.hour;
      render();
      break;
    case 'confirm-booking': {
      const btn = document.getElementById('confirm-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span> Creando reserva…';
      const booking = await createBooking();
      if(booking){
        state.confirmedBooking = booking;
        await loadMyBookings();
        render();
      } else {
        btn.disabled = false;
        btn.innerHTML = 'Confirmar reserva';
      }
      break;
    }
    case 'admin-soon': showToast('Panel admin: lo construimos en el Demo 5'); break;
  }
}

async function handleSignIn(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = document.getElementById('signin-btn');
  const errorBox = document.getElementById('auth-error');
  btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Verificando…';
  errorBox.innerHTML = '';
  const err = await signInWithPassword(fd.get('email'), fd.get('password'));
  if(err){
    errorBox.innerHTML = `<div class="alert alert-error">${esc(traduceAuthError(err.message))}</div>`;
    btn.disabled = false; btn.innerHTML = 'Iniciar sesión';
  }
}

async function handleSignUp(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = document.getElementById('signup-btn');
  const errorBox = document.getElementById('auth-error');
  btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Creando cuenta…';
  errorBox.innerHTML = '';
  const err = await signUpWithPassword(fd.get('email'), fd.get('password'), fd.get('full_name'), fd.get('phone'));
  if(err){
    errorBox.innerHTML = `<div class="alert alert-error">${esc(traduceAuthError(err.message))}</div>`;
    btn.disabled = false; btn.innerHTML = 'Crear cuenta';
  } else {
    errorBox.innerHTML = `<div class="alert alert-success">✓ Cuenta creada. Iniciando sesión…</div>`;
  }
}

async function handleMagicLink(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = document.getElementById('magic-btn');
  const errorBox = document.getElementById('auth-error');
  btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Enviando…';
  const err = await signInWithMagicLink(fd.get('email'));
  if(err){
    if(errorBox) errorBox.innerHTML = `<div class="alert alert-error">${esc(traduceAuthError(err.message))}</div>`;
    btn.disabled = false; btn.innerHTML = '✨ Enviarme magic link';
  } else {
    if(errorBox) errorBox.innerHTML = `<div class="alert alert-success">✓ Revisa tu correo. Te enviamos un link para entrar.</div>`;
    btn.innerHTML = '✓ Enviado';
  }
}

function traduceAuthError(msg){
  if(/invalid login credentials/i.test(msg)) return 'Email o contraseña incorrectos.';
  if(/email not confirmed/i.test(msg)) return 'Tu email aún no ha sido confirmado.';
  if(/user already registered/i.test(msg)) return 'Ya existe una cuenta con este email. Inicia sesión.';
  if(/password should be at least/i.test(msg)) return 'La contraseña debe tener al menos 6 caracteres.';
  if(/network/i.test(msg)) return 'Error de conexión. Verifica tu internet.';
  return msg;
}

init().catch(err => {
  console.error('Boot error:', err);
  root.innerHTML = `<div style="padding: 40px; text-align: center;"><h2 style="font-family: Fraunces, serif;">Error</h2><p>${esc(err.message)}</p></div>`;
});
</script>
